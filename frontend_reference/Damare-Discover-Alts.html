<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <title>Damare — Discover, three off-piste directions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@400;500;600&family=Special+Elite&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="tokens-singlework.css" />
  <link rel="stylesheet" href="tokens-editorial.css" />
  <link rel="stylesheet" href="tokens-desk.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; background: #1a1814; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="covers.jsx"></script>

  <script type="text/babel" src="alt-singlework.jsx"></script>
  <script type="text/babel" src="alt-editorial.jsx"></script>
  <script type="text/babel" src="alt-desk.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <DesignCanvas>
          <DCSection
            id="A"
            title="A · The Single Work — discovery as ‘what should I read tonight?’"
            subtitle="One hero work, fully rendered. Everything else is recommendation around it. Quiet, confident, taste-driven.">
            <DCArtboard id="A-discover" label="A · Discover (Hero work)" width={1280} height={1300}>
              <SwDiscover />
            </DCArtboard>
            <DCArtboard id="A-shelf" label="A · Browse (Shelf)" width={1280} height={1100}>
              <SwShelf />
            </DCArtboard>
          </DCSection>

          <DCSection
            id="B"
            title="B · The Editorial Issue — discovery as a literary magazine"
            subtitle="Discover is the new ‘issue’ each week. Asymmetric grid, big cover story, sidebars with running departments.">
            <DCArtboard id="B-discover" label="B · Discover (Issue)" width={1280} height={1320}>
              <EdDiscover />
            </DCArtboard>
            <DCArtboard id="B-novel" label="B · Novel page (story spread)" width={1280} height={1380}>
              <EdNovelPage />
            </DCArtboard>
          </DCSection>

          <DCSection
            id="C"
            title="C · The Reading Desk — discovery as a physical scene"
            subtitle="Off the deep end. Novels are objects on a desk at night: open book, pile of next-up, pinned calendar, handwritten notes. Almost no app chrome.">
            <DCArtboard id="C-desk" label="C · Discover (Desk)" width={1280} height={1200}>
              <DkDiscover />
            </DCArtboard>
            <DCArtboard id="C-reader" label="C · Reader (still on desk)" width={1280} height={1000}>
              <DkReader />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
