{% macro genres_select(name="genres") %}
<div
    x-data="{
        available: ['Романтика', 'Драма', 'Ісекай', 'Кумедія', 'Фентезі'],
        selected: [],
        input: '',
        focused: false,
        get filtered() {
            return this.available
                .filter(g => !this.selected.includes(g))
                .filter(g => g.toLowerCase().includes(this.input.toLowerCase()));
        },
        add(tag) {
            if (!this.selected.includes(tag)) this.selected.push(tag)
            this.input = ''
        },
        remove(tag) {
            this.selected = this.selected.filter(t => t !== tag)
        }
    }"
    @click.away="focused=false"
    class="relative">

    <input type="hidden" name="{{ name }}" :value="selected.join(',')" />

    <div
        @click="focused=true"
        class="flex flex-wrap items-center gap-1.5 min-h-10 px-2 py-1 rounded-md bg-bg-1 border border-line-soft hover:border-line focus-within:border-line transition cursor-text">

        <template x-for="tag in selected" :key="tag">
            <div class="px-2.5 py-0.5 rounded-md bg-bg-2 border border-line-soft text-xs text-fg-1 flex items-center gap-1.5">
                <span x-text="tag"></span>
                <button type="button" @click.stop="remove(tag)" class="text-fg-3 hover:text-warn cursor-pointer leading-none">×</button>
            </div>
        </template>

        <input
            type="text"
            x-model="input"
            @focus="focused=true"
            @keydown.backspace="if(input === '') remove(selected[selected.length-1])"
            @keydown.enter.prevent="if(filtered.length) add(filtered[0])"
            placeholder="Додати жанр…"
            class="flex-1 min-w-[120px] bg-transparent outline-none border-none p-1 text-sm text-fg-0 placeholder:text-fg-3" />
    </div>

    <div
        x-show="focused"
        x-transition.opacity.duration.150ms
        class="mt-2 p-2 rounded-md max-h-32 overflow-y-auto bg-bg-1 border border-line-soft flex flex-wrap gap-1.5">

        <template x-for="genre in filtered" :key="genre">
            <button
                type="button"
                class="px-2.5 py-0.5 rounded-md bg-bg-2 border border-line-soft text-xs text-fg-1 hover:bg-bg-3 cursor-pointer"
                @click="add(genre)"
                x-text="genre">
            </button>
        </template>

        <template x-if="filtered.length === 0">
            <span class="text-fg-3 text-xs px-1">Жанр не знайдено</span>
        </template>
    </div>
</div>
{% endmacro %}
